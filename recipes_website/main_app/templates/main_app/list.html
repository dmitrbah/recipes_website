{% extends "base.html" %}
{% block title %}Сайт кулинарных рецептов{% endblock %}
{% block content %}
    <h1>Сайт с рецептами</h1>
    {% for recipe in recipes %}
        <h2>
            <a href="{% url 'main_app:recipe_detail' recipe.id %}">{{recipe.name}}</a>
        </h2>
        <p>
            Published {{recipe.published}} by {{recipe.author}}
        </p>
        {{recipe.description|truncatewords:30|linebreaks}}
    {% endfor %}
{% endblock %}
